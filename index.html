<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Władysław Zankowski</title>
    <link rel="stylesheet" href="style.css">

  <style>
.play-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: #000;
    margin: 40px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: 0.3s;
}

/ Белый треугольник Play — исправленный /
.play-icon {
    width: 0;
    height: 0;
    border-left: 35px solid white; / увеличил, чтобы было видно */
    border-top: 22px solid transparent;
    border-bottom: 22px solid transparent;
    margin-left: 8px;
}

.play-circle:hover {
    background: #222;
}

@media (max-width: 900px) {

    body {
        background: #333;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center; 
        min-height: 100vh;
    }

    .page-wrapper {
        width: 90%;
        padding: 20px;
        background: white;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        justify-content: center; / центрируем содержимое /
        align-items: center;
        gap: 25px;
        min-height: 90vh; / чтобы блок занимал почти весь экран /
    }

    / Увеличиваем кнопки на мобильной /
    .btn {
        font-size: 22px;
        padding: 20px 50px;
    }

    / Фото чуть меньше, чтобы всё помещалось */
    .profile-photo {
        width: 200px;
        height: 200px;
    }
}
</style>
</head>
    
<body>

<div class="page-wrapper">
    <header>
        <h1>Władysław Zankowski</h1>
        <p class="subtitle">Zaprojektuję twoje marzenie</p>
    </header>

    <img src="imeges/me.jpg.jpg" alt="Władysław Zankowski" class="profile-photo">

    <nav class="main-buttons">
        <a href="o-mnie.html" class="btn">O mnie</a>
        <a href="projekty.html" class="btn">Portfolio</a>
        <a href="kontakt.html" class="btn">Kontakt</a>
    </nav>

  <a href="https://youtube.com/shorts/jGrKdNQeno8" class="play-circle">
    <div class="play-icon"></div>
</a>
</div>

</body>
</html>

</body>
</html>
